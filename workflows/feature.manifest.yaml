schema_version: 1
session_shape: feature
description: Comprehensive feature workflow based on gated-change methodology
slash_command: /feature
canonical_workflow: workflows/feature.md
session_id_format: FEATURE-NNN
session_init:
  command: session-init
  creates_workdir: work/<session_id>/
  initial_artefacts:
    - request.md
    - status.md
    - session-audit.md
auto_load:
  - path: skills/README.md
    always: true
    purpose: "Skill index"
  - path: skills/brainstorming.yaml
    always: true
    purpose: "Brainstorming skill definition"
required_artefacts:
  step_0: [request.md, status.md, session-audit.md]
  step_1: [requirement.md]
  step_2: [baseline.md]
  step_3: [design.md]
  step_4: [implementation.md]
  step_5: [verification.md]
  step_6: [review-spec.md, review-quality.md, human-verdict.md]
  step_7: [summary.md, metrics.json, retro.md]
gates:
  - id: g1_requirement_approval
    after_step: 1
    type: user_gate
    description: "User approves requirement.md"
    required_response: explicit_approval
  - id: g2_design_approval
    after_step: 3
    type: user_gate
    description: "User approves design.md"
    required_response: explicit_approval
  - id: g3_final_approval
    after_step: 7
    type: user_gate
    description: "User approves final product and rule/lesson/KB updates"
    required_response: explicit_approval
skills:
  - name: brainstorming
    phases: [step_1]
    announcement: "Using the brainstorming skill to refine <topic>"
  - name: test-driven-development
    phases: [step_2]
    announcement: "Using the test-driven-development skill to produce red tests"
  - name: writing-plans
    phases: [step_3]
    announcement: "Using the writing-plans skill to produce design.md"
  - name: subagent-driven-development
    phases: [step_4]
    announcement: "Using the subagent-driven-development skill to execute implementation"
  - name: verification-before-completion
    phases: [step_5]
    announcement: "Using the verification-before-completion skill to confirm build+tests"
  - name: code-review
    phases: [step_6]
    announcement: "Using the code-review skill for spec-compliance and code-quality review"
branch:
  default: "feature/<session_id>"
  policy: implementation_branch_committable
