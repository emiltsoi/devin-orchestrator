name: writing-plans
iron_law: Write comprehensive implementation plans assuming the engineer has zero context for our codebase. Document everything they need to know: which files to touch for each task, code, testing, docs, how to test it.
announcement: Using writing-plans skill to create the implementation plan.
checklist:
  - Scope check — ensure spec covers single subsystem
  - File structure — map out which files will be created or modified
  - Task right-sizing — each task carries its own test cycle
  - Bite-sized task granularity — each step is one action (2-5 minutes)
  - Plan document header — include required header with goal, architecture, tech stack, global constraints
  - Task definition — each task has exact file paths, complete code, verification steps
  - Self-review — check for placeholders, ambiguity, missing steps
terminal_state: Plan saved to plan.md, ready to invoke subagent-driven-development or executing-plans skill
