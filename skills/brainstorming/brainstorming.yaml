name: brainstorming
iron_law: Do NOT invoke any implementation skill, write any code, scaffold any project, or take any implementation action until you have presented a design and the user has approved it.
announcement: Using brainstorming skill to explore user intent, requirements and design before implementation.
checklist:
  - Explore project context — check files, docs, recent commits
  - Check if interactive mode is enabled
  - If interactive: Ask clarifying questions — one at a time, understand purpose/constraints/success criteria
  - If non-interactive: Make reasonable assumptions based on context and request content
  - Propose 2-3 approaches — with trade-offs and your recommendation
  - Present design — in sections scaled to their complexity
  - Conditional: Adversarial review — auto-trigger if complexity/risk thresholds met
  - Write design doc — save to design.md (include adversarial review findings if conducted)
  - Spec self-review — quick inline check for placeholders, contradictions, ambiguity, scope
  - Note: Human review happens via gate after brainstorming stage, not during skill execution
terminal_state: Design saved to design.md, ready for human review via gate
configuration:
  interactive_mode: false  # If false, make reasonable assumptions instead of asking questions
  adversarial_review_policy: conditional  # always, never, conditional
  adversarial_review_mode: standard  # fast, standard, deep
  adversarial_review_triggers:
    complexity:
      sections_threshold: 10  # auto-trigger if design has > 10 sections
      files_threshold: 5  # auto-trigger if design affects > 5 files
      size_threshold: 500  # auto-trigger if design document > 500 lines
    risk_keywords:
      - security
      - data_loss
      - breaking
      - performance
      - critical
      - production
      - deployment
    user_override: true  # allow manual override via flag
