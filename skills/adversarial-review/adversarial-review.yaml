name: adversarial-review
iron_law: Multiple perspectives must be synthesized into a structured verdict before proceeding
announcement: Using adversarial-review skill to conduct multi-perspective review
checklist:
  - Dispatch Advocate persona - steel-man the proposal
  - Dispatch Skeptic persona - find falsifiers and failure modes
  - Dispatch Oracle persona - base rates and empirical grounding
  - Dispatch Contrarian persona - challenge the framing
  - Synthesize results - produce structured verdict
  - Generate verdict - allow/allow_with_conditions/deny with risks, checks, actions
terminal_state: Structured verdict produced with top_risks, required_checks, missing_evidence, next_actions
