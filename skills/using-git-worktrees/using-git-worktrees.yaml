name: using-git-worktrees
iron_law: Detect existing isolation first. Then use native tools. Then fall back to git. Never fight the harness.
announcement: Using using-git-worktrees skill to set up an isolated workspace.
checklist:
  - Detect existing isolation — check if already in a worktree
  - Ask for consent — if not already isolated, ask before creating worktree
  - Create isolated workspace — use native tools or git worktree fallback
  - Project setup — auto-detect and run appropriate setup (npm install, cargo build, etc.)
  - Verify clean baseline — run tests to ensure workspace starts clean
  - Report status — report worktree location and branch state
terminal_state: Isolated workspace ready with clean test baseline, ready to invoke writing-plans skill
