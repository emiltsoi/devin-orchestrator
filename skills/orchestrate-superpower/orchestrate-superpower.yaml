schema_version: 1
name: orchestrate-superpower
description: "Use when a multi-stage superpower workflow is needed. Prefer mcp0_run_workflow('superpower') for end-to-end automation; only dispatch per stage manually when you need agent-level control over each stage."
iron_law: "You MUST run the superpower workflow end-to-end using the mcp0_run_workflow MCP tool with workflow: 'superpower' when available. Only dispatch per stage with mcp0_dispatch_skill (or dispatch_skill.py fallback) when mcp0_run_workflow is unavailable or a resume ticket explicitly requires a manual stage dispatch. Do NOT execute skills yourself."
triggers:
  - superpower_workflow
  - multi_stage_orchestration
checklist:
  - id: load_manifest
    description: Load superpower manifest from workflows/superpower.manifest.yaml
  - id: check_interactive_mode
    description: Check configuration for interactive_mode setting
  - id: check_skip_brainstorming
    description: Check if skip_brainstorming is true in manifest
  - id: evaluate_stage_skip
    description: For each stage in manifest, check if stage should be skipped
  - id: skip_brainstorming_placeholder
    description: If skip_brainstorming and stage is brainstorming, create placeholder design.md and skip
  - id: run_workflow
    description: Run the full superpower workflow using mcp0_run_workflow('superpower') when available
  - id: dispatch_skill
    description: Otherwise dispatch each stage skill using mcp0_dispatch_skill (or dispatch_skill.py script fallback) only when manual control is needed
  - id: pass_config_overrides
    description: Pass config_overrides for brainstorming if interactive_mode is true
  - id: validate_artifacts
    description: Read and validate output artifacts (structural floor)
  - id: triage_decision
    description: Reason about results and make triage decision (proceed/retry/escalate)
  - id: handle_gate
    description: Handle gate if present (wait for human decision in production, simulate for demo)
  - id: continue_or_stop
    description: Continue to next stage if triage decision is proceed; stop if escalate or gate blocks
terminal_state: complete
announcement: "Using the orchestrate-superpower skill to run the superpower workflow end-to-end. Prefer mcp0_run_workflow('superpower'); only fall back to per-stage mcp0_dispatch_skill when manual control is required."
red_flags:
  - Dispatching every stage manually when mcp0_run_workflow is available
  - Executing stage skills yourself instead of dispatching to Devin
  - Skipping structural floor validation
  - Proceeding after a failed stage without triage
  - Ignoring gates
