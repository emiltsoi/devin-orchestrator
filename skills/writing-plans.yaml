schema_version: 1
name: writing-plans
description: Use when you have an approved spec/requirement and need to turn it into a bite-sized implementation plan
iron_law: "EVERY STEP CONTAINS THE ACTUAL CONTENT THE ENGINEER NEEDS. NO PLACEHOLDERS. NO TBD. NO 'SIMILAR TO TASK N'."
triggers:
  - approved_spec
  - approved_requirement
  - design_phase
checklist:
  - id: scope_check
    description: Check if spec covers multiple independent subsystems; suggest decomposition if needed
  - id: file_structure
    description: Map out which files will be created or modified and their responsibilities
  - id: write_plan_header
    description: Write plan document header with goal, architecture, affected layers, test strategy
  - id: decompose_tasks
    description: Break implementation into bite-sized tasks (2-5 minutes each)
  - id: write_task_steps
    description: Write exact steps for each task with code blocks, commands, expected output
  - id: placeholder_scan
    description: Search for placeholders (TBD, TODO, "appropriate error handling") and fix them
  - id: self_review
    description: Self-review plan against spec (coverage, type consistency, cross-layer check, KB impact)
  - id: present_execution_options
    description: Present subagent-driven vs inline execution options to user
  - id: invoke_next_skill
    description: Invoke subagent-driven-development or executing-plans based on user choice
terminal_state: subagent-driven-development
announcement: "Using the writing-plans skill to produce design.md for <session_id>."
red_flags:
  - Plan steps with placeholders (TBD, TODO, "implement later")
  - Vague instructions like "add appropriate error handling"
  - Steps describing what to do without showing how (no code blocks)
  - References to undefined types, functions, or methods
  - Type inconsistencies between tasks
  - Missing cross-layer impacts
  - Steps larger than 2-5 minutes
